# Local-dev Loki config. Single-node, filesystem storage. Tuned for the
# laptop case: any container the host happens to be running gets scraped,
# including containers with a year of accumulated stdout from before Alloy
# was ever pointed at them.
#
# `reject_old_samples` is disabled so that historical Docker logs ingest
# without a 400. Production Loki should not run with this off — that's a
# separate config in the staging/production ECS deployment.

auth_enabled: false

server:
  http_listen_port: 3100

common:
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: inmemory
  replication_factor: 1
  path_prefix: /loki

schema_config:
  configs:
    - from: 2020-05-15
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

# Loki 3.x reads the chunks-store path from `storage_config.filesystem.directory`.
# When unset, the chunks flusher falls back to a relative `mkdir <tenant>`
# against Loki's CWD (`/`), which the `loki` user cannot write — producing
# "mkdir fake: permission denied" errors (the default tenant id is `fake`,
# not a permission name). The flush failures cascade: chunks pile in memory
# → ingester ring marks itself unhealthy → Alloy's writes get back 500
# "empty ring" and silently stall ingest. Verified via the `/config`
# endpoint that this is the field the chunks flusher actually reads;
# `common.storage.filesystem.chunks_directory` does NOT propagate here.
storage_config:
  filesystem:
    directory: /loki/chunks

limits_config:
  # Accept Docker logs of any age — local containers may have months of
  # backlog when they're first picked up by Alloy.
  reject_old_samples: false
  # No rate-limiting needed locally; bump the per-tenant defaults
  # generously so an initial backfill of N containers doesn't 429.
  ingestion_rate_mb: 64
  ingestion_burst_size_mb: 128

# grafanactl context configuration for the observability package.
#
# Currently defines only the `local` context. CS-10913 adds `staging` and
# `production` contexts (with tokens sourced from SSM, never committed).
#
# Used by ./scripts/apply.sh via the --config flag, so this file (rather than
# the dev's per-user grafanactl config) is the source of truth for shared
# context definitions.

contexts:
  local:
    grafana:
      server: http://localhost:3001
      org-id: 1
      user: admin
      password: admin

current-context: local

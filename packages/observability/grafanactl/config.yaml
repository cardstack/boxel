# grafanactl context configuration for the observability package.
#
# Used by ./scripts/{apply,pull,check}.sh, which render this file to a tempfile
# at runtime — substituting ${GRAFANA_TOKEN} (sourced from SSM by
# ./scripts/grafanactl-env.sh) and setting current-context to the requested env.
#
# IMPORTANT: do NOT add `current-context:` to this file. grafanactl's env-var
# override of GRAFANA_TOKEN only takes effect on the file's current-context,
# regardless of the --context flag passed at the command line. Keeping
# current-context out of the committed file (and rendering it per-invocation)
# avoids both that pitfall and the mutation `grafanactl config use-context`
# would otherwise write into a tracked file.
#
# Tokens are NEVER stored in this file. The ${GRAFANA_TOKEN} placeholder is
# substituted at apply/pull time from the env var that grafanactl-env.sh
# exports after fetching from SSM /<env>/grafana/grafanactl_token.

contexts:
  local:
    grafana:
      server: http://localhost:3001
      org-id: 1
      # Local docker-compose Grafana uses admin/admin basic auth — no token.
      user: admin
      password: admin

  staging:
    grafana:
      server: https://dashboard-staging.stack.cards
      org-id: 1
      token: ${GRAFANA_TOKEN}

  production:
    grafana:
      server: https://dashboard.boxel.ai
      org-id: 1
      token: ${GRAFANA_TOKEN}

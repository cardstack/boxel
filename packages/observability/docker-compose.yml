# Local Grafana + Loki for previewing dashboards and querying logs locally.
#
# Run from this directory:   docker compose up -d
# Login to Grafana:          http://localhost:3001  (admin / admin)
# Loki API:                  http://localhost:3100  (curl-able from host)
# Stop:                      docker compose down
#
# Port choices avoid traefik (80, 4230), the realm-server dev stack
# (4201/4210/4212/4213/4221/4222/4231/4232), and the host's common 3000.
#
# Image pins for Grafana match the production pin in
# cardstack/infra:configs/grafana/. Loki + Alloy versions are pinned independently.

services:
  grafana:
    image: grafana/grafana:12.4.3
    ports:
      - "3001:3000"
    volumes:
      # File-based provisioning (read at startup, supports ${ENV_VAR}).
      # Data sources go here because grafanactl does not manage data sources.
      - ./provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./provisioning/alerting:/etc/grafana/provisioning/alerting:ro
      # Dashboards arrive via grafanactl resources push (Phase 3 / CS-10922).
      # Local file-based dashboard provisioning is also possible — uncomment
      # the next line if a dev wants dashboards baked into the container.
      # - ./grafanactl/resources/dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana_data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      # Substituted into provisioning/datasources/loki.yaml at startup.
      LOKI_URL: http://loki:3100
    extra_hosts:
      # Lets the Grafana container reach the host's Postgres
      # (boxel-pg on 5435) for the local postgres data source.
      - "host.docker.internal:host-gateway"
    depends_on:
      # Wait for Loki to actually be ready, not just started — otherwise
      # Grafana provisioning may fail to validate the Loki data source.
      loki:
        condition: service_healthy
    restart: unless-stopped

  loki:
    image: grafana/loki:3.4.4
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      # Custom config (mounted to the same path Loki's image expects so the
      # default command line keeps working). The on-disk path_prefix is
      # /loki, so the named volume below mounts there to persist the WAL /
      # chunks / TSDB across container recreates.
      - ./loki/config.yaml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3100/ready"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  # Log scraper. Discovers running Docker containers via the host's
  # Docker socket and ships their stdout into Loki. See alloy/config.alloy
  # for the label schema.
  alloy:
    image: grafana/alloy:v1.10.0
    command:
      - run
      - /etc/alloy/config.alloy
      - --server.http.listen-addr=0.0.0.0:12345
    ports:
      # Alloy's own UI / debug endpoints — handy for verifying targets are
      # being discovered (http://localhost:12345/graph). Optional.
      - "12345:12345"
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      loki:
        condition: service_healthy
    restart: unless-stopped

volumes:
  grafana_data:
  loki_data:

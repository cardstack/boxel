<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Orbit — Project Tracker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8f9fb; color: #1a1a2e; width: 375px; }
    header { background: #1a1a2e; padding: 11px 16px; display: flex; align-items: center; justify-content: space-between; }
    .logo { font-size: 14px; font-weight: 700; color: white; }
    .logo span { color: #818cf8; }
    .avatar-row { display: flex; gap: -4px; }
    .avatar { width: 22px; height: 22px; border-radius: 50%; background: #818cf8; border: 2px solid #1a1a2e; font-size: 9px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; margin-left: -4px; }
    .avatar:first-child { margin-left: 0; }
    .av2 { background: #34d399; }
    .av3 { background: #f59e0b; }
    .sprint-header { background: white; border-bottom: 1px solid #e5e7eb; padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; }
    .sprint-label { font-size: 11px; font-weight: 700; color: #6366f1; text-transform: uppercase; letter-spacing: 0.5px; }
    .progress-wrap { display: flex; align-items: center; gap: 6px; }
    .progress-bar { width: 60px; height: 4px; background: #e5e7eb; border-radius: 2px; overflow: hidden; }
    .progress-fill { height: 100%; background: #6366f1; border-radius: 2px; width: 62%; }
    .progress-label { font-size: 10px; color: #6b7280; }
    .task-list { padding: 10px 16px; display: flex; flex-direction: column; gap: 6px; }
    .task { background: white; border: 1px solid #e5e7eb; border-radius: 7px; padding: 9px 11px; display: flex; align-items: center; gap: 9px; }
    .task.done { opacity: 0.6; }
    .check { width: 14px; height: 14px; border-radius: 3px; border: 1.5px solid #d1d5db; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .check.filled { background: #6366f1; border-color: #6366f1; color: white; font-size: 9px; }
    .task-body { flex: 1; }
    .task-title { font-size: 12px; color: #111827; line-height: 1.3; }
    .task.done .task-title { text-decoration: line-through; color: #9ca3af; }
    .task-tags { display: flex; gap: 4px; margin-top: 4px; }
    .tag { font-size: 9px; font-weight: 600; padding: 1px 6px; border-radius: 3px; }
    .tag.high { background: #fee2e2; color: #b91c1c; }
    .tag.med { background: #fef3c7; color: #92400e; }
    .tag.low { background: #d1fae5; color: #065f46; }
    .tag.feat { background: #ede9fe; color: #5b21b6; }
    .task-assignee { width: 20px; height: 20px; border-radius: 50%; background: #818cf8; font-size: 8px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; flex-shrink: 0; }
    .a2 { background: #34d399; }
    .a3 { background: #f59e0b; }
  </style>
</head>
<body>
  <header>
    <div class="logo">Or<span>bit</span></div>
    <div class="avatar-row">
      <div class="avatar">AC</div>
      <div class="avatar av2">BR</div>
      <div class="avatar av3">PS</div>
    </div>
  </header>
  <div class="sprint-header">
    <span class="sprint-label">Sprint 14</span>
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill"></div></div>
      <span class="progress-label">62% · 4d left</span>
    </div>
  </div>
  <div class="task-list">
    <div class="task done">
      <div class="check filled">✓</div>
      <div class="task-body">
        <div class="task-title">Auth token refresh endpoint</div>
        <div class="task-tags"><span class="tag feat">Feature</span></div>
      </div>
      <div class="task-assignee">AC</div>
    </div>
    <div class="task done">
      <div class="check filled">✓</div>
      <div class="task-body">
        <div class="task-title">Fix pagination offset bug</div>
        <div class="task-tags"><span class="tag high">High</span></div>
      </div>
      <div class="task-assignee a2">BR</div>
    </div>
    <div class="task">
      <div class="check"></div>
      <div class="task-body">
        <div class="task-title">Notification preferences UI</div>
        <div class="task-tags"><span class="tag feat">Feature</span><span class="tag med">Med</span></div>
      </div>
      <div class="task-assignee a3">PS</div>
    </div>
    <div class="task">
      <div class="check"></div>
      <div class="task-body">
        <div class="task-title">Write API docs for v2 endpoints</div>
        <div class="task-tags"><span class="tag low">Low</span></div>
      </div>
      <div class="task-assignee">AC</div>
    </div>
    <div class="task">
      <div class="check"></div>
      <div class="task-body">
        <div class="task-title">Dark mode polish — sidebar contrast</div>
        <div class="task-tags"><span class="tag med">Med</span></div>
      </div>
      <div class="task-assignee a2">BR</div>
    </div>
  </div>
</body>
</html>

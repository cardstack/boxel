<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="description" content="" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    {{content-for "head"}}

    <script>
      // Resolve dynamic-import chunk URLs against the host's distURL rather
      // than the document origin — the HTML may be served by realm-server
      // on a different origin than the built assets. See the
      // experimental.renderBuiltUrl hook in vite.config.mjs.
      (function () {
        var meta = document.querySelector(
          'meta[name="@cardstack/host/config/environment"]',
        );
        var assetsURL = '/';
        if (meta) {
          try {
            var config = JSON.parse(decodeURIComponent(meta.content));
            if (config && config.assetsURL) assetsURL = config.assetsURL;
          } catch (e) {}
        }
        globalThis.__boxelAssetsURL = assetsURL;
      })();
    </script>

    <link integrity="" rel="stylesheet" href="/@embroider/virtual/vendor.css" />
    <link integrity="" rel="stylesheet" href="/@embroider/virtual/app.css" />
    <link href="/boxel-favicon.png" rel="icon" type="image/x-icon" />
    <link href="/boxel-webclip.png" rel="apple-touch-icon" />
    <style>
      /* Allow prerendered cards to scroll while card-specific CSS loads */
      #boxel-isolated-start + .boxel-card-container {
        overflow-y: auto;
      }
    </style>

    {{content-for "head-footer"}}

    <meta data-boxel-head-start />
    <title>Boxel</title>
    <meta data-boxel-head-end />
  </head>
  <body>
    <script type="x/boundary" id="boxel-isolated-start"></script>
    <script type="x/boundary" id="boxel-isolated-end"></script>

    <!-- in case embercli's hooks isn't run,
         we embed the following div manually -->
    <div id="ember-basic-dropdown-wormhole"></div>
    {{content-for "body"}}

    <script>
      globalThis.process = {
        env: {},
        browser: true,
        version: '',
        versions: {},
        platform: 'browser',
        nextTick(fn, ...args) {
          Promise.resolve().then(() => fn(...args));
        },
        cwd() {
          return '';
        },
      };
      globalThis.global = globalThis;
    </script>

    <script src="/@embroider/virtual/vendor.js"></script>
    <script type="module">
      import Application from './app/app';
      import environment from './app/config/environment';

      Application.create(environment.APP);
    </script>

    {{content-for "body-footer"}}
  </body>
</html>

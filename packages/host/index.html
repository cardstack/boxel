<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="description" content="" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    {{content-for "head"}}

    <link integrity="" rel="stylesheet" href="/@embroider/virtual/vendor.css" />
    <link integrity="" rel="stylesheet" href="/@embroider/virtual/app.css" />
    <link href="/boxel-favicon.png" rel="shortcut icon" type="image/x-icon" />
    <link href="/boxel-webclip.png" rel="apple-touch-icon" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" href="{{rootURL}}assets/fonts/IBMPlexSansVar-Roman.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="{{rootURL}}assets/fonts/IBMPlexMono-Regular.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="{{rootURL}}assets/fonts/IBMPlexMono-Bold.woff2" as="font" type="font/woff2" crossorigin />
    <style>
      /* Allow prerendered cards to scroll while card-specific CSS loads */
      #boxel-isolated-start + .boxel-card-container {
        overflow-y: auto;
      }
    </style>

    {{content-for "head-footer"}}

    <meta data-boxel-head-start />
    <title>Boxel</title>
    <meta data-boxel-head-end />
  </head>

  <body>
    <script type="x/boundary" id="boxel-isolated-start"></script>
    <script type="x/boundary" id="boxel-isolated-end"></script>

    <!-- in case embercli's hooks insn't run,
         we embed the following div manually -->
    <div id="ember-basic-dropdown-wormhole"></div>
    {{content-for "body"}}

    <script>
      globalThis.process = { env: {} };
      globalThis.global = globalThis;
    </script>

    <script src="/@embroider/virtual/vendor.js"></script>
    <script type="module">
      import Application from './app/app';
      import environment from './app/config/environment';

      Application.create(environment.APP);
    </script>

</html>

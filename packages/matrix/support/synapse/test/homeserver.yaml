server_name: "localhost"
pid_file: /data/homeserver.pid
public_baseurl: "http://localhost:8008"
listeners:
  - port: 8008
    tls: false
    bind_addresses: ["::"]
    type: http
    x_forwarded: true

    resources:
      - names: [client, federation]
        compress: false

database:
  name: "sqlite3"
  args:
    database: ":memory:"

log_config: "/data/log.config"

presence:
  enabled: false

retention:
  enabled: true

rc_messages_per_second: 10000
rc_message_burst_count: 10000
rc_registration:
  per_second: 10000
  burst_count: 10000
rc_joins:
  local:
    per_second: 9999
    burst_count: 9999
  remote:
    per_second: 9999
    burst_count: 9999
rc_joins_per_room:
  per_second: 9999
  burst_count: 9999
rc_3pid_validation:
  per_second: 1000
  burst_count: 1000

rc_invites:
  per_room:
    per_second: 1000
    burst_count: 1000
  per_user:
    per_second: 1000
    burst_count: 1000

rc_login:
  address:
    per_second: 10000
    burst_count: 10000
  account:
    per_second: 10000
    burst_count: 10000
  failed_attempts:
    per_second: 10000
    burst_count: 10000

media_store_path: "/data/media_store"
uploads_path: "/data/uploads"
enable_registration: true
enable_registration_without_verification: true
disable_msisdn_registration: false
registration_shared_secret: "{{REGISTRATION_SECRET}}"
registrations_require_3pid:
  - email
registration_requires_token: true
report_stats: false
macaroon_secret_key: "{{MACAROON_SECRET_KEY}}"
form_secret: "{{FORM_SECRET}}"
signing_key_path: "/data/localhost.signing.key"

trusted_key_servers:
  - server_name: "matrix.org"
suppress_key_server_warning: true

ui_auth:
  session_timeout: "300s"

email:
  smtp_host: "boxel-smtp"
  smtp_port: 25
  enable_tls: false
  notif_from: "%(app)s <noreply@example.com>"
  app_name: "Boxel"
  enable_notifs: true
  notif_for_new_users: false
  client_base_url: "http://localhost:4200"
  validation_token_lifetime: "1h"
  subjects:
    email_validation: "%(app)s Email Validation"

templates:
  custom_template_directory: "/custom/templates/"

experimental_features:
  msc3575_enabled: true
  msc3874_enabled: true

# BEGIN_TEST_OIDC
# Google OIDC wired to navikt/mock-oauth2-server for the Playwright SSO suite.
# packages/matrix/support/synapse/index.ts strips this block unless
# MOCK_OAUTH2_ISSUER is set (the matrix global setup sets it once the mock
# container is up), so suites that don't exercise SSO boot Synapse without a
# provider whose discovery would never resolve.
sso:
  # Synapse refuses to redirect back to the host after SSO unless the target
  # is allowlisted; without this it renders its built-in success page instead.
  client_whitelist:
    - "https://localhost:4205/"
oidc_providers:
  # idp_id `google` is surfaced to clients as `oidc-google`, which the host's
  # login component looks for.
  - idp_id: google
    idp_name: "Google"
    idp_brand: "google"
    issuer: "{{MOCK_OAUTH2_ISSUER}}"
    client_id: "synapse"
    client_secret: "synapse-secret"
    scopes: ["openid", "email", "profile"]
    allow_existing_users: true
    # The mock issuer is plain http; authlib's metadata validation otherwise
    # rejects a non-https issuer and Synapse refuses to boot. Test-only.
    skip_verification: true
    user_mapping_provider:
      module: boxel_oidc_mapping_provider.BoxelOidcMappingProvider
      config: {}
# END_TEST_OIDC

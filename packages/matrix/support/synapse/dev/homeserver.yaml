server_name: "localhost"
pid_file: /data/homeserver.pid
public_baseurl: "http://localhost:8008"
listeners:
  - port: 8008
    tls: false
    bind_addresses: ["::"]
    type: http
    x_forwarded: true

    resources:
      - names: [client, federation]
        compress: false
  # Prometheus metrics listener — scraped by the local observability stack
  # (packages/observability/prometheus/prometheus.yml). Only configured for
  # the dev template because tests spawn many synapse containers and don't
  # need metrics; production parity is a separate ECS-side decision.
  - port: 9001
    bind_addresses: ["::"]
    type: metrics

enable_metrics: true

database:
  name: "sqlite3"
  args:
    database: "/data/db/homeserver.db"

log_config: "/data/log.config"

presence:
  enabled: false

retention:
  enabled: true

rc_messages_per_second: 10000
rc_message_burst_count: 10000
rc_registration:
  per_second: 10000
  burst_count: 10000
rc_joins:
  local:
    per_second: 9999
    burst_count: 9999
  remote:
    per_second: 9999
    burst_count: 9999
rc_joins_per_room:
  per_second: 9999
  burst_count: 9999
rc_3pid_validation:
  per_second: 1000
  burst_count: 1000

rc_invites:
  per_room:
    per_second: 1000
    burst_count: 1000
  per_user:
    per_second: 1000
    burst_count: 1000

rc_login:
  address:
    per_second: 10000
    burst_count: 10000
  account:
    per_second: 10000
    burst_count: 10000
  failed_attempts:
    per_second: 10000
    burst_count: 10000

media_store_path: "/data/media_store"
uploads_path: "/data/uploads"
enable_registration: true
enable_registration_without_verification: true
disable_msisdn_registration: false
registration_shared_secret: "{{REGISTRATION_SECRET}}"
registrations_require_3pid:
  - email
registration_requires_token: true
report_stats: false
macaroon_secret_key: "{{MACAROON_SECRET_KEY}}"
form_secret: "{{FORM_SECRET}}"
signing_key_path: "/data/localhost.signing.key"

trusted_key_servers:
  - server_name: "matrix.org"
suppress_key_server_warning: true

ui_auth:
  session_timeout: "300s"

email:
  smtp_host: "boxel-smtp"
  smtp_port: 25
  enable_tls: false
  notif_from: "%(app)s <noreply@example.com>"
  app_name: "Boxel"
  enable_notifs: true
  notif_for_new_users: false
  client_base_url: "https://localhost:4200"
  validation_token_lifetime: "1h"
  subjects:
    email_validation: "%(app)s Email Validation"

templates:
  custom_template_directory: "/custom/templates/"

experimental_features:
  msc3575_enabled: true
  msc3874_enabled: true

# BEGIN_GOOGLE_OIDC
# Google sign-in is activated locally by setting GOOGLE_OAUTH_CLIENT_ID and
# GOOGLE_OAUTH_CLIENT_SECRET in the developer's shell before starting Synapse.
# Without those env vars, packages/matrix/support/synapse/index.ts strips this
# entire block so Synapse boots cleanly for unrelated dev work.
#
# To enable Google sign-in locally:
#   1. Create a Google Cloud OAuth 2.0 client (Web application).
#   2. Add http://localhost:8008/_synapse/client/oidc/callback as an authorized
#      redirect URI.
#   3. Export GOOGLE_OAUTH_CLIENT_ID and GOOGLE_OAUTH_CLIENT_SECRET in your
#      shell, then restart Synapse.
sso:
  # Without this allowlist Synapse refuses to redirect back to the host's URL
  # after a successful SSO sign-in and renders its built-in success page
  # instead — which surfaces as the browser sitting on `/oidc/callback` with
  # no further activity.
  client_whitelist:
    - "https://localhost:4200/"
    - "http://localhost:4200/"
oidc_providers:
  - idp_id: google
    idp_name: "Google"
    idp_brand: "google"
    issuer: "https://accounts.google.com/"
    client_id: "{{GOOGLE_OAUTH_CLIENT_ID}}"
    client_secret: "{{GOOGLE_OAUTH_CLIENT_SECRET}}"
    scopes: ["openid", "email", "profile"]
    allow_existing_users: true
    user_mapping_provider:
      module: boxel_oidc_mapping_provider.BoxelOidcMappingProvider
      config: {}
# END_GOOGLE_OIDC

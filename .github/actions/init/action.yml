name: Init
description: Setup common dependencies

runs:
  using: composite
  steps:
    - uses: jdx/mise-action@c1ecc8f748cd28cdeabf76dab3cccde4ce692fe4 # v4.0.0
      with:
        install: true

    - name: Get pnpm store directory
      id: pnpm-cache
      shell: bash
      run: |
        echo "STORE_PATH=$(pnpm store path -s)" >> $GITHUB_OUTPUT

    - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      name: Setup pnpm cache
      id: cache
      with:
        path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-

    - name: Install Dependencies
      shell: bash
      run: pnpm install --frozen-lockfile

    # Ensure puppeteer's Chrome is present. actions/cache caches the pnpm
    # store but not ~/.cache/puppeteer, and puppeteer's postinstall can leave
    # an empty browser folder (download skipped) — which makes the prerender
    # fail with "Could not find Chrome" in env-mode CI (where
    # PUPPETEER_EXECUTABLE_PATH isn't pointed at a system Chrome) and makes a
    # plain `browsers install` refuse with "folder exists but executable is
    # missing". Clear any partial install, then download cleanly.
    - name: Ensure puppeteer Chrome is installed
      shell: bash
      working-directory: packages/realm-server
      run: |
        rm -rf "${PUPPETEER_CACHE_DIR:-$HOME/.cache/puppeteer}/chrome"
        pnpm exec puppeteer browsers install chrome

    - name: Prune pnpm store
      if: ${{ steps.cache.outputs.cache-hit != 'true' }}
      shell: bash
      run: pnpm store prune

    # Provision the mandatory dev cert so the realm-server can speak
    # HTTPS+HTTP/2 — the only protocol it supports. Local devs get this
    # via `mise run infra:ensure-dev-cert`; CI runs it explicitly here
    # so every downstream job starts with the cert in
    # ~/.local/share/boxel/dev-certs/ and `NODE_EXTRA_CA_CERTS` pointed
    # at mkcert's root. See packages/realm-server/server.ts and
    # mise-tasks/infra/ensure-dev-cert.
    - name: Install mkcert
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y mkcert libnss3-tools

    - name: Provision dev TLS cert
      shell: bash
      run: mise run infra:ensure-dev-cert

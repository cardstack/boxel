name: Init
description: Setup common dependencies

runs:
  using: composite
  steps:
    - uses: jdx/mise-action@c1ecc8f748cd28cdeabf76dab3cccde4ce692fe4 # v4.0.0
      with:
        install: true

    - name: Get pnpm store directory
      id: pnpm-cache
      shell: bash
      run: |
        echo "STORE_PATH=$(pnpm store path -s)" >> $GITHUB_OUTPUT

    - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      name: Setup pnpm cache
      id: cache
      with:
        path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-

    # The Chrome build the prerender service drives via puppeteer lives in
    # ~/.cache/puppeteer, outside the pnpm store, so it is cached separately to
    # avoid re-downloading ~150MB on every job. The key tracks the lockfile
    # because the resolved puppeteer pins the browser version.
    - uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      name: Restore puppeteer browser cache
      id: puppeteer-cache
      with:
        path: ~/.cache/puppeteer
        key: ${{ runner.os }}-puppeteer-${{ hashFiles('**/pnpm-lock.yaml') }}

    # PUPPETEER_SKIP_DOWNLOAD keeps puppeteer's postinstall from fetching the
    # browser; it is provisioned explicitly below so the version is pinned and
    # the postinstall can't leave a half-written browser folder that later makes
    # puppeteer treat Chrome as present and skip it, breaking the prerender.
    - name: Install Dependencies
      shell: bash
      env:
        PUPPETEER_SKIP_DOWNLOAD: "true"
      run: pnpm install --frozen-lockfile

    # Install from the puppeteer resolved in the workspace, pinning the browser
    # to the version puppeteer-core launches at runtime. A no-op when the cache
    # restored a complete browser; downloads on a miss. On a miss any partial
    # browser folder a postinstall may have left is dropped first so the install
    # re-downloads rather than erroring on a missing executable. `install` takes
    # a single browser, so chrome and chrome-headless-shell are installed
    # separately; both launch modes then resolve.
    - name: Ensure prerender Chrome is installed
      shell: bash
      env:
        PUPPETEER_CACHE_HIT: ${{ steps.puppeteer-cache.outputs.cache-hit }}
      run: |
        if [ "$PUPPETEER_CACHE_HIT" != "true" ]; then
          rm -rf "$HOME/.cache/puppeteer"
        fi
        pnpm --filter @cardstack/realm-server exec puppeteer browsers install chrome
        pnpm --filter @cardstack/realm-server exec puppeteer browsers install chrome-headless-shell

    # Persist the browser only on a miss and only once the install above
    # succeeded, so a partial or failed download is never saved into the cache.
    - uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      name: Save puppeteer browser cache
      if: ${{ success() && steps.puppeteer-cache.outputs.cache-hit != 'true' }}
      with:
        path: ~/.cache/puppeteer
        key: ${{ runner.os }}-puppeteer-${{ hashFiles('**/pnpm-lock.yaml') }}

    - name: Prune pnpm store
      if: ${{ steps.cache.outputs.cache-hit != 'true' }}
      shell: bash
      run: pnpm store prune

    # Provision the mandatory dev cert so the realm-server can speak
    # HTTPS+HTTP/2 — the only protocol it supports. Local devs get this
    # via `mise run infra:ensure-dev-cert`; CI runs it explicitly here
    # so every downstream job starts with the cert in
    # ~/.local/share/boxel/dev-certs/ and `NODE_EXTRA_CA_CERTS` pointed
    # at mkcert's root. See packages/realm-server/server.ts and
    # mise-tasks/infra/ensure-dev-cert.
    - name: Install mkcert
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y mkcert libnss3-tools

    - name: Provision dev TLS cert
      shell: bash
      run: mise run infra:ensure-dev-cert

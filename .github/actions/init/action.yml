name: Init
description: Setup common dependencies

runs:
  using: composite
  steps:
    - uses: jdx/mise-action@c1ecc8f748cd28cdeabf76dab3cccde4ce692fe4 # v4.0.0
      with:
        install: true

    - name: Get pnpm store directory
      id: pnpm-cache
      shell: bash
      run: |
        echo "STORE_PATH=$(pnpm store path -s)" >> $GITHUB_OUTPUT

    - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      name: Setup pnpm cache
      id: cache
      with:
        path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-

    - name: Install Dependencies
      shell: bash
      run: pnpm install --frozen-lockfile

    # Provision the Chrome build the prerender service drives via puppeteer.
    # The puppeteer cache can carry a partial browser folder — the versioned
    # directory present but its executable missing — which makes both
    # puppeteer's postinstall and `browsers install` treat Chrome as already
    # present and skip the download, so the prerender later fails to launch
    # with "Could not find Chrome (ver. <pinned>)". Clear the cache and install
    # fresh from the puppeteer resolved in the workspace, which pins the browser
    # to the version puppeteer-core launches at runtime. `install` takes a
    # single browser, so chrome and chrome-headless-shell are installed in
    # separate invocations; both launch modes then resolve.
    - name: Ensure prerender Chrome is installed
      shell: bash
      run: |
        rm -rf "${PUPPETEER_CACHE_DIR:-$HOME/.cache/puppeteer}"
        pnpm --filter @cardstack/realm-server exec puppeteer browsers install chrome
        pnpm --filter @cardstack/realm-server exec puppeteer browsers install chrome-headless-shell

    - name: Prune pnpm store
      if: ${{ steps.cache.outputs.cache-hit != 'true' }}
      shell: bash
      run: pnpm store prune

    # Provision the mandatory dev cert so the realm-server can speak
    # HTTPS+HTTP/2 — the only protocol it supports. Local devs get this
    # via `mise run infra:ensure-dev-cert`; CI runs it explicitly here
    # so every downstream job starts with the cert in
    # ~/.local/share/boxel/dev-certs/ and `NODE_EXTRA_CA_CERTS` pointed
    # at mkcert's root. See packages/realm-server/server.ts and
    # mise-tasks/infra/ensure-dev-cert.
    - name: Install mkcert
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y mkcert libnss3-tools

    - name: Provision dev TLS cert
      shell: bash
      run: mise run infra:ensure-dev-cert

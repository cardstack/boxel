name: Init
description: Setup common dependencies

runs:
  using: composite
  steps:
    - uses: jdx/mise-action@c1ecc8f748cd28cdeabf76dab3cccde4ce692fe4 # v4.0.0
      with:
        install: true

    - name: Get pnpm store directory
      id: pnpm-cache
      shell: bash
      run: |
        echo "STORE_PATH=$(pnpm store path -s)" >> $GITHUB_OUTPUT

    - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      name: Setup pnpm cache
      id: cache
      with:
        path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-

    - name: Install Dependencies
      shell: bash
      run: pnpm install --frozen-lockfile

    # Provision the Chrome build the prerender service drives via puppeteer.
    # puppeteer's postinstall is not a reliable source of the browser: it only
    # downloads into ~/.cache/puppeteer when it decides the binary is absent,
    # and that decision can silently skip the download, leaving the prerender
    # to fail at launch with "Could not find Chrome (ver. <pinned>)". Installing
    # it explicitly from the puppeteer that's actually resolved in the workspace
    # pins the browser to the version puppeteer-core launches at runtime,
    # independent of the postinstall heuristic. chrome-headless-shell is fetched
    # alongside chrome so both launch modes resolve.
    - name: Ensure prerender Chrome is installed
      shell: bash
      run: pnpm --filter @cardstack/realm-server exec puppeteer browsers install chrome chrome-headless-shell

    - name: Prune pnpm store
      if: ${{ steps.cache.outputs.cache-hit != 'true' }}
      shell: bash
      run: pnpm store prune

    # Provision the mandatory dev cert so the realm-server can speak
    # HTTPS+HTTP/2 — the only protocol it supports. Local devs get this
    # via `mise run infra:ensure-dev-cert`; CI runs it explicitly here
    # so every downstream job starts with the cert in
    # ~/.local/share/boxel/dev-certs/ and `NODE_EXTRA_CA_CERTS` pointed
    # at mkcert's root. See packages/realm-server/server.ts and
    # mise-tasks/infra/ensure-dev-cert.
    - name: Install mkcert
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y mkcert libnss3-tools

    - name: Provision dev TLS cert
      shell: bash
      run: mise run infra:ensure-dev-cert

name: Warm test Docker images
description: >-
  Pull the test suite's third-party Docker images (synapse, smtp4dev, postgres)
  through an ECR pull-through cache and retag them to their canonical Docker Hub
  names, so the services start from a local image instead of racing an
  unauthenticated Docker Hub pull. Docker Hub rate-limits / connection timeouts
  from the shared runner IP pool are the cause of the recurring "Failed to reach
  Synapse" host-test failures. Best-effort: callers should set
  continue-on-error so a miss falls back to a (hardened-retry) Docker Hub pull.

inputs:
  role-to-assume:
    description: IAM role ARN with ECR pull-through cache permissions.
    required: true
  aws-region:
    description: AWS region hosting the ECR pull-through cache.
    default: us-east-1
  ecr-registry:
    description: ECR registry host, e.g. <account>.dkr.ecr.<region>.amazonaws.com
    required: true
  pull-through-prefix:
    description: ecr_repository_prefix of the Docker Hub pull-through cache rule.
    default: docker-hub

runs:
  using: composite
  steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
      with:
        role-to-assume: ${{ inputs.role-to-assume }}
        aws-region: ${{ inputs.aws-region }}
    - name: Pull and retag images via ECR pull-through cache
      shell: bash
      env:
        ECR_REGISTRY: ${{ inputs.ecr-registry }}
        PULL_THROUGH_PREFIX: ${{ inputs.pull-through-prefix }}
        AWS_REGION: ${{ inputs.aws-region }}
      run: |
        set -euo pipefail
        aws ecr get-login-password --region "$AWS_REGION" \
          | docker login --username AWS --password-stdin "$ECR_REGISTRY"

        # warm <canonical-docker-hub-ref> <upstream-path-under-pull-through-prefix>
        # Official images live under library/ on Docker Hub, so their upstream
        # path is library/<name>; namespaced images keep their <org>/<name>.
        warm() {
          canonical="$1"
          mirror="$ECR_REGISTRY/$PULL_THROUGH_PREFIX/$2"
          for attempt in 1 2 3 4 5; do
            if docker pull "$mirror"; then
              docker tag "$mirror" "$canonical"
              return 0
            fi
            delay=$((attempt * 5))
            echo "docker pull $mirror failed (attempt $attempt/5); retrying in ${delay}s..."
            sleep "$delay"
          done
          echo "::warning::could not warm $canonical from ECR mirror; falling back to Docker Hub"
        }

        warm matrixdotorg/synapse:v1.126.0 matrixdotorg/synapse:v1.126.0
        warm rnwood/smtp4dev:v3.1          rnwood/smtp4dev:v3.1
        warm postgres:16.3                 library/postgres:16.3

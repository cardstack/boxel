name: Setup boxel-cli (internal)
description: |
  Internal helper for the workspace-sync, publish-preview-realm, and
  unpublish-preview-realm composite actions. Checks out the boxel monorepo
  at the ref the parent action was invoked with, builds packages/boxel-cli
  from source, puts `boxel` on $PATH, and runs `boxel profile add` so
  subsequent `boxel realm …` calls authenticate as the supplied Matrix
  user. Not intended to be referenced by consumer workflows directly.

inputs:
  matrix-url:
    description: Matrix server URL (used to infer the Matrix domain).
    required: true
  matrix-username:
    description: Matrix username without the leading @ or :domain suffix.
    required: true
  matrix-password:
    description: Matrix password.
    required: true
  realm-server-url:
    description: |
      Realm-server URL. Optional — when the Matrix ID's domain is a known
      one (stack.cards / boxel.ai / localhost), boxel profile add fills
      this in from built-in defaults. Pass explicitly when those defaults
      do not apply.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Checkout boxel monorepo for boxel-cli source
      shell: bash
      env:
        BOXEL_REPO: ${{ github.action_repository }}
        BOXEL_REF: ${{ github.action_ref }}
      run: |
        # Clone outside the consumer's $GITHUB_WORKSPACE so the source tree
        # never appears under any `boxel realm push .` input path.
        SRC="${RUNNER_TEMP}/boxel-src"
        rm -rf "$SRC"
        git clone --depth 1 "https://github.com/${BOXEL_REPO}.git" "$SRC"
        git -C "$SRC" fetch --depth 1 origin "$BOXEL_REF"
        git -C "$SRC" checkout FETCH_HEAD
        echo "BOXEL_SRC=$SRC" >> "$GITHUB_ENV"

    - name: Install mise (node + pnpm)
      uses: jdx/mise-action@c1ecc8f748cd28cdeabf76dab3cccde4ce692fe4 # v4.0.0
      with:
        install: true
        working_directory: ${{ env.BOXEL_SRC }}

    - name: Cache pnpm store
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      with:
        path: ~/.local/share/pnpm/store
        key: ${{ runner.os }}-boxel-pnpm-${{ hashFiles(format('{0}/pnpm-lock.yaml', env.BOXEL_SRC)) }}
        restore-keys: |
          ${{ runner.os }}-boxel-pnpm-

    - name: Install workspace dependencies
      shell: bash
      working-directory: ${{ env.BOXEL_SRC }}
      run: pnpm install --frozen-lockfile --filter @cardstack/boxel-cli...

    - name: Build boxel-cli
      shell: bash
      working-directory: ${{ env.BOXEL_SRC }}/packages/boxel-cli
      run: pnpm build

    - name: Put boxel on PATH
      shell: bash
      run: echo "${BOXEL_SRC}/packages/boxel-cli/bin" >> "$GITHUB_PATH"

    - name: Configure boxel profile
      shell: bash
      env:
        BOXEL_PASSWORD: ${{ inputs.matrix-password }}
        MATRIX_URL: ${{ inputs.matrix-url }}
        MATRIX_USERNAME: ${{ inputs.matrix-username }}
        REALM_SERVER_URL: ${{ inputs.realm-server-url }}
      run: |
        if echo "$MATRIX_URL" | grep -q "boxel.ai"; then
          DOMAIN="boxel.ai"
        elif echo "$MATRIX_URL" | grep -q "stack.cards"; then
          DOMAIN="stack.cards"
        else
          DOMAIN="localhost"
        fi
        ARGS=(
          profile add
          --user "@${MATRIX_USERNAME}:${DOMAIN}"
          --password "$BOXEL_PASSWORD"
          --matrix-url "$MATRIX_URL"
        )
        if [ -n "$REALM_SERVER_URL" ]; then
          ARGS+=(--realm-server-url "$REALM_SERVER_URL")
        fi
        boxel "${ARGS[@]}"

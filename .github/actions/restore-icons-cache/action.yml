name: Restore boxel-icons build cache
description: Restores cached boxel-icons build output (dist + declarations) keyed on source inputs

outputs:
  cache-hit:
    description: Whether the cache was hit
    value: ${{ steps.cache.outputs.cache-hit }}

runs:
  using: composite
  steps:
    - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      id: cache
      with:
        path: |
          packages/boxel-icons/dist
          packages/boxel-icons/declarations
        key: boxel-icons-${{ hashFiles('packages/boxel-icons/src/**', 'packages/boxel-icons/unpublished-development-types/**', 'packages/boxel-icons/package.json', 'packages/boxel-icons/rollup.config.mjs', 'packages/boxel-icons/tsconfig.json', 'packages/boxel-icons/babel.config.json') }}

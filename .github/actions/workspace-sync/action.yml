name: Sync to Boxel workspace
description: |
  Sync a local directory to a Boxel workspace using `boxel realm push`
  from the in-tree @cardstack/boxel-cli. Replaces hand-rolled curl /
  boxel-cli-clone steps that boxel-home, boxel-catalog, and boxel-skills
  each used to maintain independently.

inputs:
  workspace-url:
    description: Target workspace URL.
    required: true
  matrix-url:
    description: Matrix server URL.
    required: true
  matrix-username:
    description: Matrix username without the leading @ or :domain suffix.
    required: true
  matrix-password:
    description: Matrix password.
    required: true
  realm-server-url:
    description: |
      Optional realm-server URL. Defaults are inferred from matrix-url for
      stack.cards / boxel.ai / localhost domains; supply this for any other
      environment.
    required: false
    default: ""
  source-path:
    description: Local directory to push to the workspace.
    required: false
    default: "."
  delete:
    description: When 'true', delete remote files that do not exist locally.
    required: false
    default: "true"
  dry-run:
    description: When 'true', show what would change without writing.
    required: false
    default: "false"

outputs:
  sync-output:
    description: Captured stdout/stderr from `boxel realm push`.
    value: ${{ steps.sync.outputs.sync-output }}

# The first seven steps duplicate the same setup-boxel-cli scaffolding in
# publish-preview-realm and unpublish-preview-realm: a composite action's
# `uses:` ref must be a literal string at parse time (no expressions), so
# we cannot delegate to a sibling action and have it run at the same ref
# the consumer pinned. Keep them in sync when changing any one.
runs:
  using: composite
  steps:
    - name: Locate boxel monorepo source
      id: boxel-src
      shell: bash
      env:
        BOXEL_REPO: ${{ github.action_repository }}
        BOXEL_REF: ${{ github.action_ref }}
        CURRENT_REPO: ${{ github.repository }}
      # In-repo short-circuit: see sibling publish-preview-realm action
      # for the rationale. External consumers (boxel-catalog, -home,
      # -skills) still go through the full clone + install path.
      run: |
        if [ "$BOXEL_REPO" = "$CURRENT_REPO" ]; then
          echo "BOXEL_SRC=$GITHUB_WORKSPACE" >> "$GITHUB_ENV"
          echo "in_repo=true" >> "$GITHUB_OUTPUT"
        else
          SRC="${RUNNER_TEMP}/boxel-src"
          rm -rf "$SRC"
          git clone --depth 1 "https://github.com/${BOXEL_REPO}.git" "$SRC"
          git -C "$SRC" fetch --depth 1 origin "$BOXEL_REF"
          git -C "$SRC" checkout FETCH_HEAD
          echo "BOXEL_SRC=$SRC" >> "$GITHUB_ENV"
          echo "in_repo=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Install mise (node + pnpm)
      if: steps.boxel-src.outputs.in_repo != 'true'
      uses: jdx/mise-action@c1ecc8f748cd28cdeabf76dab3cccde4ce692fe4 # v4.0.0
      with:
        install: true
        working_directory: ${{ env.BOXEL_SRC }}

    - name: Cache pnpm store
      if: steps.boxel-src.outputs.in_repo != 'true'
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      with:
        path: ~/.local/share/pnpm/store
        key: ${{ runner.os }}-boxel-pnpm-${{ hashFiles(format('{0}/pnpm-lock.yaml', env.BOXEL_SRC)) }}
        restore-keys: |
          ${{ runner.os }}-boxel-pnpm-

    - name: Install workspace dependencies
      if: steps.boxel-src.outputs.in_repo != 'true'
      shell: bash
      working-directory: ${{ env.BOXEL_SRC }}
      run: pnpm install --frozen-lockfile --filter @cardstack/boxel-cli...

    - name: Build boxel-cli
      shell: bash
      working-directory: ${{ env.BOXEL_SRC }}/packages/boxel-cli
      run: pnpm build

    - name: Make `boxel` available on PATH
      shell: bash
      # The bin directory contains `boxel.js` (the file package.json's
      # `bin` field maps to `boxel`). Just prepending the directory to
      # PATH would expose `boxel.js`, not `boxel`. Symlink the entry
      # point under /usr/local/bin so consumers can call `boxel …` the
      # way npm/pnpm-installed callers do.
      run: sudo ln -sf "${BOXEL_SRC}/packages/boxel-cli/bin/boxel.js" /usr/local/bin/boxel

    - name: Configure boxel profile
      shell: bash
      env:
        BOXEL_PASSWORD: ${{ inputs.matrix-password }}
        MATRIX_URL: ${{ inputs.matrix-url }}
        MATRIX_USERNAME: ${{ inputs.matrix-username }}
        REALM_SERVER_URL: ${{ inputs.realm-server-url }}
      run: |
        if echo "$MATRIX_URL" | grep -q "boxel.ai"; then
          DOMAIN="boxel.ai"
        elif echo "$MATRIX_URL" | grep -q "stack.cards"; then
          DOMAIN="stack.cards"
        else
          DOMAIN="localhost"
        fi
        ARGS=(
          profile add
          --user "@${MATRIX_USERNAME}:${DOMAIN}"
          --password "$BOXEL_PASSWORD"
          --matrix-url "$MATRIX_URL"
        )
        if [ -n "$REALM_SERVER_URL" ]; then
          ARGS+=(--realm-server-url "$REALM_SERVER_URL")
        fi
        boxel "${ARGS[@]}"

    - id: sync
      shell: bash
      env:
        SOURCE_PATH: ${{ inputs.source-path }}
        WORKSPACE_URL: ${{ inputs.workspace-url }}
        DELETE: ${{ inputs.delete }}
        DRY_RUN: ${{ inputs.dry-run }}
      run: |
        URL="${WORKSPACE_URL%/}/"
        ARGS=(realm push "$SOURCE_PATH" "$URL")
        if [ "$DELETE" = "true" ]; then ARGS+=(--delete); fi
        if [ "$DRY_RUN" = "true" ]; then ARGS+=(--dry-run); fi

        set +e
        OUTPUT=$(boxel "${ARGS[@]}" 2>&1)
        STATUS=$?
        set -e
        echo "$OUTPUT"

        {
          echo "sync-output<<BOXEL_EOF"
          echo "$OUTPUT"
          echo "BOXEL_EOF"
        } >> "$GITHUB_OUTPUT"

        exit $STATUS

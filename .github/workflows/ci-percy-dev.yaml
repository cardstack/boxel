name: Percy dev run (throwaway project)

# Manual-only. Runs a narrow subset of Percy snapshots against a throwaway
# Percy project (token in secrets.PERCY_TOKEN_THROWAWAY) so we can iterate on
# false-positive fixes without burning the shared quota or colliding with
# production Percy baselines. See CS-10954.

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  test-web-assets:
    name: Build test web assets
    uses: ./.github/workflows/test-web-assets.yaml
    with:
      caller: ci-percy-dev
      skip_catalog: true

  percy-dev:
    name: Filtered Percy run (throwaway)
    runs-on: ubuntu-latest
    needs: test-web-assets
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/init

      - name: Download test web assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.test-web-assets.outputs.artifact_name }}
          path: .test-web-assets-artifact
      - name: Restore test web assets into workspace
        shell: bash
        run: |
          shopt -s dotglob
          cp -a .test-web-assets-artifact/. ./

      - name: Disable TCP/UDP network offloading
        run: sudo ethtool -K eth0 tx off rx off

      - name: Start test services (icons + host dist + realm servers)
        run: mise run test-services:host | tee -a /tmp/server.log &
        env:
          SKIP_CATALOG: true

      - name: Create realm users
        run: pnpm register-realm-users
        working-directory: packages/matrix

      - name: Install D-Bus helpers
        run: |
          sudo apt-get update
          sudo apt-get install -y dbus-x11 upower
          sudo service dbus restart
          sudo service upower restart

      - name: Run filtered Percy subset against throwaway project
        working-directory: packages/host
        env:
          PERCY_TOKEN: ${{ secrets.PERCY_TOKEN_THROWAWAY }}
          PERCY_GZIP: true
          DBUS_SYSTEM_BUS_ADDRESS: unix:path=/run/dbus/system_bus_socket
          SKIP_CATALOG: true
        # Filter matches exactly the snapshots we expect to exercise the fixes:
        #   - codeblocks: 5 Monaco cases (paint race + indent guide)
        #   - sending.+displays: 2 transition/animation cases
        #   - View Code panel: 1 Monaco (JSON codeblock in AI assistant)
        #   - there are no spec instances: 1 (divider icon cascade)
        #   - compound field.+plural.+atom format: 1 control (never flaked on main)
        run: |
          set -e
          READY_URLS='http-get://localhost:4201/base/_readiness-check?acceptHeader=application%2Fvnd.api%2Bjson|http-get://localhost:4202/test/_readiness-check?acceptHeader=application%2Fvnd.api%2Bjson|http-get://localhost:4202/node-test/_readiness-check?acceptHeader=application%2Fvnd.api%2Bjson|http-get://localhost:4201/skills/_readiness-check?acceptHeader=application%2Fvnd.api%2Bjson|http://localhost:8008|http://localhost:5001'
          dbus-run-session -- npx percy exec -- \
            npx start-server-and-test 'pnpm run wait' "$READY_URLS" \
            'sleep 15 && npx ember exam --path ./dist --filter "/codeblocks|sending.+displays|View Code panel|there are no spec instances|compound field.+plural.+atom format/" --preserve-test-name'

      - name: Print realm server logs
        if: ${{ !cancelled() }}
        run: cat /tmp/server.log

      - name: Upload realm server log
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: percy-dev-server-log
          path: /tmp/server.log
          retention-days: 14

name: host-test-harness publish

# Manual `workflow_dispatch` only — the maintainer cuts a new harness
# release when the test path materially changes (typically when bumping
# `@cardstack/boxel-cli`'s pin in `packages/boxel-cli/host-test-harness.json`).
#
# Produces a tarball of `packages/host/dist/` (dev-mode build) and
# attaches it to a GH release tagged `host-test-harness-v<version>`.
# `boxel test` downloads that tarball on first run per CLI version and
# caches it under `~/.cache/boxel-cli/host-test-harness/<version>/`.
#
# CS-11164.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Semver for this harness (e.g. 0.5.42). Will tag as host-test-harness-v<version>.'
        required: true

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main

      - uses: ./.github/actions/init

      - name: Build host (dev mode keeps test entries)
        run: pnpm --filter @cardstack/host build

      - name: Verify dev build includes test entry
        run: |
          set -euo pipefail
          if [ ! -f packages/host/dist/tests/index.html ]; then
            echo "::error::packages/host/dist/tests/index.html missing — production build was likely used. Use \`vite build --mode=development\` (the default \`pnpm build\` in packages/host)."
            exit 1
          fi

      - name: Pack harness
        id: pack
        run: |
          set -euo pipefail
          tar --exclude '*.map' -czf harness.tar.gz -C packages/host/dist .
          SHA=$(shasum -a 256 harness.tar.gz | awk '{print $1}')
          SIZE_BYTES=$(stat -c%s harness.tar.gz)
          SIZE_MB=$(awk "BEGIN{printf \"%.2f\", $SIZE_BYTES/1024/1024}")
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "size_bytes=$SIZE_BYTES" >> "$GITHUB_OUTPUT"
          echo "size_mb=$SIZE_MB" >> "$GITHUB_OUTPUT"

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="host-test-harness-v${{ inputs.version }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "::error::Release $TAG already exists. Pick a different version."
            exit 1
          fi
          gh release create "$TAG" harness.tar.gz \
            --title "$TAG" \
            --notes "Host dev dist for boxel-cli's local test runner (CS-11164).

            **sha256**: \`${{ steps.pack.outputs.sha256 }}\`
            **size**: ${{ steps.pack.outputs.size_mb }} MB (${{ steps.pack.outputs.size_bytes }} bytes)

            Consumed by \`boxel test\` via the runtime fetcher in
            \`packages/boxel-cli/src/lib/host-test-harness-fetcher.ts\`.
            Pin a new version by editing
            \`packages/boxel-cli/host-test-harness.json\`."
          echo "Released $TAG with sha256 ${{ steps.pack.outputs.sha256 }}"

name: CS-11161 action demo (TEMPORARY)

# TEMPORARY: exercises the three new composite actions
# (workspace-sync, publish-preview-realm, unpublish-preview-realm)
# end-to-end against the same localhost matrix + realm-server stack
# that boxel-cli-test boots, so the PR shows them running in CI.
# Delete this file (and the test-web-assets call below) after the
# demo run is captured.

on:
  workflow_dispatch:
  push:
    branches: [cs-11161-extract-workspace-sync-action]

concurrency:
  group: cs-11161-action-demo-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  test-web-assets:
    name: Build test web assets
    uses: ./.github/workflows/test-web-assets.yaml
    with:
      caller: cs-11161-action-demo

  action-demo:
    name: Run new actions against local stack
    needs: [test-web-assets]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/init

      - name: Download test web assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.test-web-assets.outputs.artifact_name }}
          path: .test-web-assets-artifact
      - name: Restore test web assets into workspace
        shell: bash
        run: |
          shopt -s dotglob
          cp -a .test-web-assets-artifact/. ./

      - name: Start Matrix
        run: pnpm start:matrix
        working-directory: packages/realm-server
      - name: Register realm users
        run: pnpm register-realm-users
        working-directory: packages/matrix
      - name: Start dev stack (base realm + prerenderer)
        run: |
          mise run test-services:matrix | tee -a /tmp/server.log &
          # Realm-server and vite host both speak HTTPS+HTTP/2 only; `-k`
          # tolerates the mkcert leaf cert from infra:ensure-dev-cert. The
          # %{http_code} check guards against the dispatcher's 3xx ahead
          # of the base realm finishing its initial index.
          timeout 600 bash -c 'until curl -sk -o /dev/null -w "%{http_code}" https://localhost:4200/ | grep -qx 200 && curl -sk -o /dev/null -w "%{http_code}" -H "Accept: application/vnd.api+json" https://localhost:4201/base/_readiness-check | grep -qx 200; do sleep 2; done'

      - name: Build a small fixture to push
        shell: bash
        run: |
          mkdir -p /tmp/cs-11161-fixture
          cat > /tmp/cs-11161-fixture/README.md <<'EOF'
          # CS-11161 action demo
          Pushed by the temporary demo workflow to prove the new
          workspace-sync / publish-preview-realm / unpublish-preview-realm
          actions work end-to-end on a fresh runner.
          EOF

      - name: Demo publish-preview-realm
        id: publish_demo
        uses: cardstack/boxel/.github/actions/publish-preview-realm@cs-11161-extract-workspace-sync-action
        with:
          realm-name: cs-11161-demo-${{ github.run_id }}
          display-name: "CS-11161 demo realm"
          published-realm-url: https://cs-11161-demo-${{ github.run_id }}.localhost:4201/
          source-path: /tmp/cs-11161-fixture
          matrix-url: http://localhost:8008
          matrix-username: user
          matrix-password: password
          realm-server-url: https://localhost:4201/
          readiness-timeout-ms: "120000"

      - name: Demo workspace-sync (re-push to the just-created source realm)
        uses: cardstack/boxel/.github/actions/workspace-sync@cs-11161-extract-workspace-sync-action
        with:
          workspace-url: ${{ steps.publish_demo.outputs.source-realm-url }}
          source-path: /tmp/cs-11161-fixture
          matrix-url: http://localhost:8008
          matrix-username: user
          matrix-password: password
          realm-server-url: https://localhost:4201/

      - name: Demo unpublish-preview-realm
        if: always() && steps.publish_demo.outcome == 'success'
        uses: cardstack/boxel/.github/actions/unpublish-preview-realm@cs-11161-extract-workspace-sync-action
        with:
          published-realm-url: https://cs-11161-demo-${{ github.run_id }}.localhost:4201/
          matrix-url: http://localhost:8008
          matrix-username: user
          matrix-password: password
          realm-server-url: https://localhost:4201/

      - name: Print server logs
        if: ${{ !cancelled() }}
        run: cat /tmp/server.log

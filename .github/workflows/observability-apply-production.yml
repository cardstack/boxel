name: Observability — apply to production

# Manual-dispatch workflow that runs `grafanactl resources push --context
# production` against the production self-host Grafana. Mirrors the staging
# workflow (observability-apply-staging.yml) but with deliberately different
# guardrails for prod:
#
# - Only fires on workflow_dispatch (no automatic push trigger). Production
#   dashboard changes are an intentional act, not a side-effect of merging.
# - Refuses to run if dispatched from any branch other than `main` (use
#   `--ref main` from the dispatch UI). A misclick on the wrong branch can't
#   silently apply unmerged changes to prod.
# - Pre-flight assertion that the rendered config file's production server URL
#   matches the expected hostname — guards against a config-as-code mistake
#   that would silently apply a non-prod manifest set to prod.

on:
  # Standalone manual dispatch, e.g., to push a dashboard-only change without
  # running the full boxel deploy.
  workflow_dispatch: {}
  # Also reusable from `manual-deploy.yml` so a production boxel deploy
  # applies the observability config alongside the realm-server / host /
  # worker deploys, in the same orchestrated run. The required-reviewers
  # gate on the `observability-production` environment still fires either
  # way.
  workflow_call: {}

permissions:
  contents: read
  id-token: write

concurrency:
  # Never run two applies in parallel against production. cancel-in-progress
  # is false: if a second dispatch happens while one is mid-flight, queue it
  # rather than killing the in-flight push and leaving Grafana half-updated.
  group: observability-apply-production
  cancel-in-progress: false

jobs:
  apply:
    name: Apply to production
    runs-on: ubuntu-latest

    # `environment: observability-production` gives the run a production
    # badge in the GitHub Actions UI and a clickable link to the Grafana
    # endpoint. We deliberately do NOT configure required reviewers on the
    # environment in repo Settings — for this workflow, the act of dispatching
    # (or running a manual prod deploy via manual-deploy.yml) is approval
    # enough; an additional reviewer step would just add friction without
    # extra safety, since the dispatcher is already a trusted operator.
    environment:
      name: observability-production
      url: https://dashboard.boxel.ai

    env:
      AWS_REGION: us-east-1
      # Dedicated, narrowly-scoped role at configs/boxel-observability-apply/production
      # in cardstack/infra. Permissions are ssm:GetParameter on:
      #   /production/grafana/grafanactl_token  (added in cardstack/infra#666)
      #   /production/loki/internal_url         (added in cardstack/infra#674, CS-10968)
      #   /production/boxel/GRAFANA_SECRET      (CS-10929 — used by operator-action
      #                                         button panels for `Authorization:
      #                                         Bearer ${grafana_secret}`; matches
      #                                         the realm-server task's existing
      #                                         shared secret)
      AWS_ROLE_ARN: arn:aws:iam::120317779495:role/boxel-observability-apply
      # Server URL is NOT set here — single source of truth is
      # packages/observability/grafanactl/config.yaml (see staging workflow
      # for the rationale). The pre-flight check below asserts the expected
      # hostname for paranoia.
      EXPECTED_GRAFANA_HOSTNAME: dashboard.boxel.ai
      GRAFANACTL_VERSION: "0.1.10"
      # Worker CloudWatch log group + owning AWS account, substituted into
      # provisioning/alerting/worker-status-group.json at push time
      # (CS-11107). Hardcoded here rather than fetched from SSM: the log
      # group name follows the deterministic `ecs-boxel-worker-<env>`
      # convention and the account-id is already baked into AWS_ROLE_ARN
      # above. Without this, the same provisioning file shipped to both
      # envs would have prod querying staging's log group (the original
      # CS-11107 bug — every evaluation failed with ResourceNotFoundException).
      WORKER_LOG_GROUP_NAME: ecs-boxel-worker-production
      WORKER_LOG_GROUP_ACCOUNT_ID: "120317779495"

    steps:
      - name: Refuse to apply from non-main branches
        # workflow_dispatch lets the operator pick a ref. Production should
        # only ever apply from main. A typo'd ref would otherwise silently
        # push whatever's on the chosen branch to prod.
        run: |
          set -eo pipefail
          REF="${{ github.ref }}"
          if [[ "$REF" != "refs/heads/main" ]]; then
            echo "::error::This workflow may only be dispatched against refs/heads/main." >&2
            echo "Got ref: $REF" >&2
            exit 1
          fi
          echo "Confirmed dispatch from main."

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Pre-flight — assert config.yaml's production server URL
        # Defense against a config-as-code mistake (e.g., someone renaming
        # the production context's server URL by accident or as part of an
        # un-cutover Phase 6 dry-run). If config.yaml has anything other
        # than the expected hostname for the production context, abort
        # before fetching credentials.
        #
        # The awk uses an in-block flag rather than awk's range syntax
        # (`/start/,/end/`), because `/^  production:$/,/^  [a-z]/` would
        # match only the start line — the end pattern `^  [a-z]` matches
        # the start line itself, terminating the range immediately.
        working-directory: packages/observability
        run: |
          set -eo pipefail
          ACTUAL="$(awk '
            /^  production:$/      { in_prod=1; next }
            in_prod && /^  [a-z]/  { exit }
            in_prod && /^      server:/ { print $2; exit }
          ' grafanactl/config.yaml)"
          echo "config.yaml production server: $ACTUAL"
          echo "expected:                       https://${EXPECTED_GRAFANA_HOSTNAME}"
          if [[ "$ACTUAL" != "https://${EXPECTED_GRAFANA_HOSTNAME}" ]]; then
            echo "::error::config.yaml's production context server URL doesn't match expected hostname." >&2
            echo "If this is an intentional rename, update EXPECTED_GRAFANA_HOSTNAME in this workflow to match." >&2
            exit 1
          fi

      - name: Install grafanactl
        uses: ./.github/actions/install-grafanactl
        with:
          version: ${{ env.GRAFANACTL_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Source data-source secrets from SSM
        # Each provisioning/datasources/*.yaml has placeholders that get
        # substituted by apply-datasources.sh at push time. The IAM grants
        # for these specific SSM paths live in cardstack/infra at
        # configs/boxel-observability-apply/ — adding a new env var here
        # without the matching grant gets a hard AccessDenied.
        run: |
          fetch() {  # name path [--with-decryption]
            local var="$1" path="$2"
            shift 2
            local val
            val="$(aws ssm get-parameter --name "$path" "$@" \
              --query 'Parameter.Value' --output text)"
            if [[ " $* " == *" --with-decryption "* ]]; then
              echo "::add-mask::$val"
            fi
            echo "${var}=${val}" >> "$GITHUB_ENV"
          }

          fetch GRAFANA_TOKEN          /production/grafana/grafanactl_token   --with-decryption
          fetch LOKI_URL               /production/loki/internal_url
          fetch BOXEL_DB_HOST          /production/boxel-grafana/db_host
          fetch SYNAPSE_PROMETHEUS_URL /production/boxel-grafana/prometheus_url
          fetch REALM_SERVER_URL       /production/boxel-grafana/realm_server_url
          fetch BOXEL_DB_NAME          /production/boxel/PGDATABASE
          fetch BOXEL_DB_USER          /production/boxel/GRAFANA_DB_USER
          fetch BOXEL_DB_PASSWORD      /production/boxel/GRAFANA_DB_PASSWORD  --with-decryption
          fetch GRAFANA_SECRET         /production/boxel/GRAFANA_SECRET       --with-decryption

      - name: Lint
        # Belt-and-suspenders: ci-lint.yaml runs the same lint at PR time
        # without a token. Here, with the production token already sourced
        # from SSM, GRAFANACTL_VALIDATE_ENV adds a "validate against the
        # live production Grafana" step. PRETTIER_SKIP avoids duplicating
        # ci-lint's YAML format check (which requires pnpm install —
        # overkill for this focused workflow).
        working-directory: packages/observability
        env:
          GRAFANACTL_VALIDATE_ENV: production
          PRETTIER_SKIP: "1"
        run: ./scripts/lint.sh

      - name: Apply
        working-directory: packages/observability
        run: |
          ./scripts/apply.sh --env production

      - name: Summary
        if: always()
        run: |
          echo "## Observability apply (PRODUCTION)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Target: production (server URL from packages/observability/grafanactl/config.yaml)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Dispatched ref: \`${{ github.ref }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Triggered by: \`${{ github.actor }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- grafanactl: \`$GRAFANACTL_VERSION\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Status: ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"

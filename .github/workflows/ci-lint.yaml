name: CI Lint

on:
  push:
    branches: [main]
  pull_request:
    # Observability has its own lint workflow (observability-diff.yml's
    # `lint` job) that runs the full lint script — including the prettier
    # YAML check. Skipping ci-lint on observability-only PRs avoids ~5 min
    # of unrelated lint work; coverage on observability changes lives in
    # the dedicated workflow. Deny-list rather than allow-list so adding
    # a new package automatically gets linted (the inverse failure mode —
    # silently skipping lint for a new package — is worse).
    paths-ignore:
      - "packages/observability/**"

permissions:
  checks: write
  contents: read
  id-token: write
  pull-requests: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    concurrency:
      group: lint-${{ github.head_ref || github.run_id }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/init

      - name: Lint Boxel Icons
        if: ${{ !cancelled() }}
        run: pnpm run lint
        working-directory: packages/boxel-icons
      - name: Restore boxel-icons build cache
        id: icons-cache
        if: ${{ !cancelled() }}
        uses: ./.github/actions/restore-icons-cache
      - name: Build Boxel Icons
        # To faciliate linting of projects that depend on Boxel Icons
        if: ${{ !cancelled() && steps.icons-cache.outputs.cache-hit != 'true' }}
        run: pnpm run build
        working-directory: packages/boxel-icons
      - name: Lint Boxel UI
        if: ${{ !cancelled() }}
        run: pnpm run lint
        working-directory: packages/boxel-ui/addon
      - name: Build Boxel UI
        # To faciliate linting of projects that depend on Boxel UI
        if: ${{ !cancelled() }}
        run: pnpm run build
        working-directory: packages/boxel-ui/addon
      - name: Lint remaining packages
        if: ${{ !cancelled() }}
        shell: bash
        run: |
          set -euo pipefail

          run_lint() {
            local label="$1"
            local dir="$2"

            echo "::group::${label}"
            pnpm --dir "$dir" run lint
            echo "::endgroup::"
          }

          (
            set -euo pipefail
            run_lint "Lint Boxel UI Test App" packages/boxel-ui/test-app
            run_lint "Lint Host" packages/host
            run_lint "Lint Base Realm" packages/base
            run_lint "Lint ESLint Plugin" packages/eslint-plugin-boxel
          ) &
          pids=("$!")

          (
            set -euo pipefail
            run_lint "Lint Matrix" packages/matrix
            run_lint "Lint Realm Server" packages/realm-server
            run_lint "Lint Runtime Common" packages/runtime-common
            run_lint "Lint Experiments Realm" packages/experiments-realm
          ) &
          pids+=("$!")

          (
            set -euo pipefail
            run_lint "Lint Realm Test Harness" packages/realm-test-harness
            run_lint "Lint Billing" packages/billing
            run_lint "Lint Postgres" packages/postgres
            run_lint "Lint AI Bot" packages/ai-bot
          ) &
          pids+=("$!")

          (
            set -euo pipefail
            run_lint "Lint Software Factory" packages/software-factory
            run_lint "Lint Boxel Tools VS Code extension" packages/vscode-boxel-tools
            run_lint "Lint Bot Runner" packages/bot-runner
            run_lint "Lint Boxel CLI" packages/boxel-cli
          ) &
          pids+=("$!")

          failures=0
          for pid in "${pids[@]}"; do
            if ! wait "$pid"; then
              failures=1
            fi
          done

          exit "$failures"

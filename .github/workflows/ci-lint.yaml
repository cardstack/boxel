name: CI Lint

on:
  push:
    branches: [main]
  pull_request:
    # Observability has its own lint workflow (observability-diff.yml's
    # `lint` job) that runs the full lint script — including the prettier
    # YAML check. Skipping ci-lint on observability-only PRs avoids ~5 min
    # of unrelated lint work; coverage on observability changes lives in
    # the dedicated workflow. Deny-list rather than allow-list so adding
    # a new package automatically gets linted (the inverse failure mode —
    # silently skipping lint for a new package — is worse).
    paths-ignore:
      - "packages/observability/**"

permissions:
  checks: write
  contents: read
  id-token: write
  pull-requests: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    concurrency:
      group: lint-${{ github.head_ref || github.run_id }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/init

      - name: Lint Boxel Icons
        if: ${{ !cancelled() }}
        run: pnpm run lint
        working-directory: packages/boxel-icons
      - name: Restore boxel-icons build cache
        id: icons-cache
        if: ${{ !cancelled() }}
        uses: ./.github/actions/restore-icons-cache
      - name: Build Boxel Icons
        # To faciliate linting of projects that depend on Boxel Icons
        if: ${{ !cancelled() && steps.icons-cache.outputs.cache-hit != 'true' }}
        run: pnpm run build
        working-directory: packages/boxel-icons
      - name: Lint Boxel UI
        if: ${{ !cancelled() }}
        run: pnpm run lint
        working-directory: packages/boxel-ui/addon
      - name: Build Boxel UI
        # To faciliate linting of projects that depend on Boxel UI
        if: ${{ !cancelled() }}
        run: pnpm run build
        working-directory: packages/boxel-ui/addon
      - name: Lint Boxel UI Test App
        if: ${{ !cancelled() }}
        run: pnpm run lint
        working-directory: packages/boxel-ui/test-app
      - name: Lint Host
        if: ${{ !cancelled() }}
        run: pnpm run lint
        working-directory: packages/host
      - name: Lint Matrix
        if: ${{ !cancelled() }}
        run: pnpm run lint
        working-directory: packages/matrix
      - name: Lint Realm Server
        if: ${{ !cancelled() }}
        run: pnpm run lint
        working-directory: packages/realm-server
      - name: Lint Realm Test Harness
        if: ${{ !cancelled() }}
        run: pnpm run lint
        working-directory: packages/realm-test-harness
      - name: Lint Runtime Common
        if: ${{ !cancelled() }}
        run: pnpm run lint
        working-directory: packages/runtime-common
      - name: Lint Billing
        if: ${{ !cancelled() }}
        run: pnpm run lint
        working-directory: packages/billing
      - name: Lint Postgres
        if: ${{ !cancelled() }}
        run: pnpm run lint
        working-directory: packages/postgres
      - name: Lint Base Realm
        if: ${{ !cancelled() }}
        run: pnpm run lint
        working-directory: packages/base
      - name: Lint Catalog Realm
        if: ${{ !cancelled() }}
        run: pnpm run lint
        working-directory: packages/catalog-realm
      - name: Lint Experiments Realm
        if: ${{ !cancelled() }}
        run: pnpm run lint
        working-directory: packages/experiments-realm
      - name: Lint Software Factory
        if: ${{ !cancelled() }}
        run: pnpm run lint
        working-directory: packages/software-factory
      - name: Lint Boxel Tools VS Code extension
        if: ${{ !cancelled() }}
        run: pnpm run lint
        working-directory: packages/vscode-boxel-tools
      - name: Lint ESLint Plugin
        if: ${{ !cancelled() }}
        run: pnpm run lint
        working-directory: packages/eslint-plugin-boxel
      - name: Lint AI Bot
        if: ${{ !cancelled() }}
        run: pnpm run lint
        working-directory: packages/ai-bot
      - name: Lint Bot Runner
        if: ${{ !cancelled() }}
        run: pnpm run lint
        working-directory: packages/bot-runner
      - name: Lint Workspace Sync CLI
        if: ${{ !cancelled() }}
        run: pnpm run lint
        working-directory: packages/workspace-sync-cli
      - name: Lint Boxel CLI
        if: ${{ !cancelled() }}
        run: pnpm run lint
        working-directory: packages/boxel-cli
      - name: Verify Boxel CLI plugin synopsis is fresh
        # Regenerates the `<!-- generated:commands -->` blocks in plugin/skills/*/SKILL.md
        # from the Commander tree and fails if the working tree changed — i.e. someone
        # added or changed a CLI command without running `pnpm build:plugin`.
        if: ${{ !cancelled() }}
        run: |
          pnpm run build:plugin
          if ! git diff --exit-code -- plugin/skills; then
            echo "::error::plugin/skills synopsis is stale. Run 'pnpm build:plugin' in packages/boxel-cli and commit the result."
            exit 1
          fi
        working-directory: packages/boxel-cli
      - name: Verify plugin version bumped when synopsis changed
        # If a PR's diff against main touches any generated:commands block, the plugin's
        # version must also bump in the same diff. Otherwise marketplace consumers won't
        # see the update — Claude Code caches by version string.
        if: ${{ !cancelled() && github.event_name == 'pull_request' }}
        run: |
          set -euo pipefail
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          # Did any synopsis line change?
          SYNOPSIS_CHANGED=$(git diff "$BASE" "$HEAD" -- 'packages/boxel-cli/plugin/skills/**/SKILL.md' \
            | grep -E '^[+-](### `boxel |\*\*Arguments|\*\*Options|- `[-A-Za-z]+|- `<|- `\[)' || true)
          if [ -z "$SYNOPSIS_CHANGED" ]; then
            echo "No generated synopsis changes detected; skipping version-bump check."
            exit 0
          fi
          # Was the plugin manifest version touched?
          if ! git diff "$BASE" "$HEAD" -- packages/boxel-cli/plugin/.claude-plugin/plugin.json \
            | grep -qE '^[+-]\s*"version"'; then
            echo "::error::plugin/skills synopsis changed but plugin.json version was not bumped. Marketplace consumers won't see the update without a new version. Bump 'version' in packages/boxel-cli/plugin/.claude-plugin/plugin.json."
            exit 1
          fi
          echo "Synopsis changed and plugin.json version was bumped — OK."
        working-directory: .

name: Manual Publish [boxel-cli]

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Semver bump level"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      environment:
        description: "Publish environment (staging = beta tag, production = latest tag)"
        required: false
        default: staging
        type: choice
        options:
          - staging
          - production

permissions:
  contents: write
  id-token: write

concurrency:
  group: publish-boxel-cli
  cancel-in-progress: false

jobs:
  publish:
    name: Build and publish @cardstack/boxel-cli
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          fetch-depth: 0

      - uses: ./.github/actions/init

      - name: Configure git
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"

      - name: Bump version
        id: version
        working-directory: packages/boxel-cli
        run: |
          npm version ${{ inputs.bump }} --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Bumped to version $VERSION"

      - name: Build boxel-cli
        run: pnpm build
        working-directory: packages/boxel-cli

      - name: Commit version bump and tag
        run: |
          TAG="boxel-cli-v${{ steps.version.outputs.version }}"
          git add packages/boxel-cli/package.json
          git commit -m "Release @cardstack/boxel-cli v${{ steps.version.outputs.version }}"
          git tag "$TAG"
          git push origin main --tags

      - name: Publish to npm
        working-directory: packages/boxel-cli
        run: |
          if [ "${{ inputs.environment }}" = "production" ]; then
            pnpm publish --access public --provenance --no-git-checks
          else
            pnpm publish --access public --provenance --no-git-checks --tag beta
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="boxel-cli-v${VERSION}"
          NPM_URL="https://www.npmjs.com/package/@cardstack/boxel-cli/v/${VERSION}"

          ARGS=(
            --title "@cardstack/boxel-cli v${VERSION}"
            --notes "Published to npm: ${NPM_URL}"
          )

          if [ "${{ inputs.environment }}" = "staging" ]; then
            ARGS+=(--prerelease)
          fi

          gh release create "$TAG" "${ARGS[@]}"

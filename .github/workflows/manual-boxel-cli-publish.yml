name: Manual Publish [boxel-cli]

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Semver bump level"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      environment:
        description: "Publish environment (staging = beta tag, production = latest tag)"
        required: false
        default: staging
        type: choice
        options:
          - staging
          - production

permissions:
  contents: write
  id-token: write

concurrency:
  group: publish-boxel-cli
  cancel-in-progress: false

jobs:
  test-web-assets:
    name: Build test web assets
    uses: ./.github/workflows/test-web-assets.yaml
    with:
      caller: manual-boxel-cli-publish
    concurrency:
      group: manual-boxel-cli-publish-test-web-assets-${{ github.run_id }}
      cancel-in-progress: false

  publish:
    name: Build and publish @cardstack/boxel-cli
    needs: test-web-assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          fetch-depth: 0

      - uses: ./.github/actions/init

      - name: Configure git
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"

      - name: Download test web assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.test-web-assets.outputs.artifact_name }}
          path: .test-web-assets-artifact

      - name: Restore test web assets into workspace
        shell: bash
        run: |
          shopt -s dotglob
          cp -a .test-web-assets-artifact/. ./

      - name: Run unit tests
        working-directory: packages/boxel-cli
        run: pnpm test:unit-exclude-smoke

      - name: Start Matrix
        run: pnpm start:matrix
        working-directory: packages/realm-server

      - name: Create realm users
        run: pnpm register-realm-users
        working-directory: packages/matrix

      - name: Start dev stack (icons + host-dist + base realm + prerenderer)
        run: |
          mise run test-services:matrix | tee -a /tmp/server.log &
          timeout 600 bash -c 'until curl -sf http://localhost:4200 > /dev/null && curl -sf -H "Accept: application/vnd.api+json" http://localhost:4201/base/_readiness-check > /dev/null; do sleep 2; done'

      - name: Run integration tests
        working-directory: packages/boxel-cli
        run: pnpm test:integration

      - name: Print server logs
        if: ${{ !cancelled() }}
        run: cat /tmp/server.log

      - name: Bump version
        id: version
        working-directory: packages/boxel-cli
        run: |
          npm version ${{ inputs.bump }} --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Bumped to version $VERSION"

      - name: Build boxel-cli
        run: pnpm build
        working-directory: packages/boxel-cli

      - name: Commit version bump and tag
        run: |
          TAG="boxel-cli-v${{ steps.version.outputs.version }}"
          git add packages/boxel-cli/package.json
          git commit -m "Release @cardstack/boxel-cli v${{ steps.version.outputs.version }}"
          git tag "$TAG"
          git push origin main --tags

      - name: Publish to npm
        working-directory: packages/boxel-cli
        run: |
          if [ "${{ inputs.environment }}" = "production" ]; then
            npm publish --access public --provenance
          else
            npm publish --access public --provenance --tag beta
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="boxel-cli-v${{ steps.version.outputs.version }}"

          PREV_TAG=$(git tag --list 'boxel-cli-v*' --sort=-version:refname | grep -vxF "$TAG" | head -n 1)

          ARGS=()
          ARGS+=(--title "@cardstack/boxel-cli v${{ steps.version.outputs.version }}")
          ARGS+=(--generate-notes)

          if [ -n "$PREV_TAG" ]; then
            ARGS+=(--notes-start-tag "$PREV_TAG")
          fi

          if [ "${{ inputs.environment }}" = "staging" ]; then
            ARGS+=(--prerelease)
          fi

          gh release create "$TAG" "${ARGS[@]}"
